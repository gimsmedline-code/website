<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="100%" height="100%">
  <defs>
    <linearGradient id="medGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f5f76"/>
      <stop offset="100%" stop-color="#24b6b6"/>
    </linearGradient>
  </defs>
  
  <!-- Icon Group -->
  <g transform="translate(10, 20)">
    <!-- Medical Cross -->
    <path d="M 30 10 h 18 v 20 h 20 v 18 h -20 v 20 h -18 v -20 h -20 v -18 h 20 z" fill="url(#medGradient)" />
    <!-- Heartbeat Pulse Line intersecting -->
    <path d="M 5 39 h 15 l 8 -22 l 12 45 l 10 -23 l 8 5 h 15" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Typography -->
  <text x="105" y="72" font-family="'Inter', -apple-system, sans-serif" font-weight="800" font-size="56" fill="#0f172a" letter-spacing="-1.5">GIMS</text>
  <text x="260" y="72" font-family="'Inter', -apple-system, sans-serif" font-weight="600" font-size="56" fill="#0f5f76" letter-spacing="1">MEDLINE</text>
  
  <!-- Tagline -->
  <text x="108" y="98" font-family="'Inter', -apple-system, sans-serif" font-weight="600" font-size="13" fill="#64748b" letter-spacing="3.8">ADVANCING CLINICAL OUTCOMES</text>
</svg>
